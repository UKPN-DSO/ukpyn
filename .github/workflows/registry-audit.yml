name: Registry Audit

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  audit-registry:
    name: Audit ODP metadata and registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Sync unmanaged datasets into registry
        id: sync
        run: |
          python scripts/sync_unmanaged_registry.py
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('.github/unmanaged-datasets.json').read_text(encoding='utf-8'))
          with Path(os.environ['GITHUB_OUTPUT']).open("a", encoding="utf-8") as fh:
              fh.write(f"new_count={payload['new_count']}\n")
              fh.write(f"registry_changed={str(payload['registry_changed']).lower()}\n")
              fh.write(f"new_dataset_ids={','.join(payload['new_dataset_ids'])}\n")
          PY

      - name: Create pull request for registry updates
        if: steps.sync.outputs.registry_changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/registry-unmanaged-sync
          base: dev
          delete-branch: true
          commit-message: "chore(registry): sync unmanaged ODP datasets"
          title: "chore(registry): sync unmanaged ODP datasets"
          body: |
            Automated daily registry audit from ODP metadata.

            - Updates `UNMANAGED_DATASETS` in `src/ukpyn/dataset_registry.py`
            - Generated by `.github/workflows/registry-audit.yml`

      - name: Check for existing open triage issue
        id: existing-issue
        if: steps.sync.outputs.new_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('.github/unmanaged-datasets.json', 'utf8'));
            const marker = `<!-- unmanaged-datasets:${payload.new_dataset_ids.join(',')} -->`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => (issue.body || '').includes(marker));
            core.setOutput('exists', existing ? 'true' : 'false');

      - name: Create triage issue for new unmanaged datasets
        if: steps.sync.outputs.new_count != '0' && steps.existing-issue.outputs.exists != 'true'
        uses: actions/github-script@v7
        env:
          MAINTAINERS: JamieMBright
        with:
          script: |
            const fs = require('fs');
            const now = new Date().toISOString().slice(0, 10);
            const payload = JSON.parse(fs.readFileSync('.github/unmanaged-datasets.json', 'utf8'));
            const maintainers = process.env.MAINTAINERS || 'JamieMBright';
            const reviewNote = `\n\n## Review ownership\n- Maintainers for PR review: ${maintainers}`;
            const body = `${fs.readFileSync('.github/unmanaged-datasets-report.md', 'utf8')}${reviewNote}`;

            const payloadBase = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ODP triage: ${payload.new_count} new unmanaged dataset(s) (${now})`,
              body,
            };

            try {
              const issue = await github.rest.issues.create({
                ...payloadBase,
                assignees: ['copilot'],
              });
              core.info(`Created issue #${issue.data.number} and assigned copilot`);
            } catch (error) {
              core.warning(`Unable to assign copilot (${error.message}); creating issue without assignee`);
              const fallbackBody = `${body}\n- Note: automatic @copilot assignment was not permitted for this repository.`;
              const issue = await github.rest.issues.create({
                ...payloadBase,
                body: fallbackBody,
              });
              core.info(`Created issue #${issue.data.number} without assignee`);
            }
