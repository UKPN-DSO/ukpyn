name: Registry Audit

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  audit-registry:
    name: Audit ODP metadata and registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Sync unmanaged datasets into registry
        id: sync
        run: |
          python scripts/sync_unmanaged_registry.py
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path('.github/unmanaged-datasets.json').read_text(encoding='utf-8'))
          with Path(os.environ['GITHUB_OUTPUT']).open("a", encoding="utf-8") as fh:
              fh.write(f"new_count={payload['new_count']}\n")
              fh.write(f"registry_changed={str(payload['registry_changed']).lower()}\n")
              fh.write(f"new_dataset_ids={','.join(payload['new_dataset_ids'])}\n")
              fh.write(f"breaking_field_changes={payload.get('breaking_field_changes', 0)}\n")
              fh.write(f"field_changes={len(payload.get('field_changes', []))}\n")
          PY

      - name: Create pull request for registry updates
        if: steps.sync.outputs.registry_changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: chore/registry-unmanaged-sync
          base: dev
          delete-branch: true
          commit-message: "chore(registry): sync unmanaged ODP datasets"
          title: "chore(registry): sync unmanaged ODP datasets"
          body: |
            Automated daily registry audit from ODP metadata.

            - Updates `UNMANAGED_DATASETS` in `src/ukpyn/dataset_registry.py`
            - Generated by `.github/workflows/registry-audit.yml`

      - name: Create pull request for field schema updates
        if: steps.sync.outputs.field_changes != '0'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: chore/field-schema-sync
          base: dev
          delete-branch: true
          commit-message: "chore(schemas): update field schemas from ODP"
          title: "chore(schemas): ODP field schema changes detected"
          body: |
            Automated daily field schema audit from ODP API.

            - Updates `src/ukpyn/field_schemas.json` with current live fields
            - Breaking changes: ${{ steps.sync.outputs.breaking_field_changes }}
            - Total changes: ${{ steps.sync.outputs.field_changes }}
            - Generated by `.github/workflows/registry-audit.yml`

            See `.github/unmanaged-datasets-report.md` for full details.

      - name: Create issue for breaking field changes
        if: steps.sync.outputs.breaking_field_changes != '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          MAINTAINERS: JamieMBright
        with:
          script: |
            const fs = require('fs');
            const now = new Date().toISOString().slice(0, 10);
            const payload = JSON.parse(fs.readFileSync('.github/unmanaged-datasets.json', 'utf8'));
            const breaking = payload.field_changes.filter(c => c.removed.length > 0);
            const maintainers = process.env.MAINTAINERS || 'JamieMBright';

            let body = `## Breaking field schema changes detected\n\n`;
            body += `Audit run: ${now}\n\n`;
            body += `**${breaking.length}** dataset(s) have had fields removed on ODP.\n`;
            body += `Orchestrator queries referencing these fields will fail at runtime.\n\n`;

            for (const change of breaking) {
              body += `### ${change.dataset_id}\n`;
              body += `- **Removed**: ${change.removed.map(f => '`' + f + '`').join(', ')}\n`;
              if (change.added.length > 0) {
                body += `- **Added**: ${change.added.map(f => '`' + f + '`').join(', ')}\n`;
              }
              body += `\n`;
            }

            body += `## Action required\n`;
            body += `- Review affected orchestrators and update hardcoded field names\n`;
            body += `- Check if removed fields were renamed (added fields may be replacements)\n`;
            body += `- Update tests and tutorials if affected\n`;
            body += `\n## Review ownership\n- Maintainers: ${maintainers}\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ODP BREAKING: ${breaking.length} dataset(s) with removed fields (${now})`,
              body,
              labels: ['bug', 'schema-change'],
            });

      - name: Check for existing open triage issue
        id: existing-issue
        if: steps.sync.outputs.new_count != '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('.github/unmanaged-datasets.json', 'utf8'));
            const marker = `<!-- unmanaged-datasets:${payload.new_dataset_ids.join(',')} -->`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => (issue.body || '').includes(marker));
            core.setOutput('exists', existing ? 'true' : 'false');

      - name: Create triage issue for new unmanaged datasets
        if: steps.sync.outputs.new_count != '0' && steps.existing-issue.outputs.exists != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          MAINTAINERS: JamieMBright
        with:
          script: |
            const fs = require('fs');
            const now = new Date().toISOString().slice(0, 10);
            const payload = JSON.parse(fs.readFileSync('.github/unmanaged-datasets.json', 'utf8'));
            const maintainers = process.env.MAINTAINERS || 'JamieMBright';
            const reviewNote = `\n\n## Review ownership\n- Maintainers for PR review: ${maintainers}`;
            const body = `${fs.readFileSync('.github/unmanaged-datasets-report.md', 'utf8')}${reviewNote}`;

            const payloadBase = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ODP triage: ${payload.new_count} new unmanaged dataset(s) (${now})`,
              body,
            };

            try {
              const issue = await github.rest.issues.create({
                ...payloadBase,
                assignees: ['copilot'],
              });
              core.info(`Created issue #${issue.data.number} and assigned copilot`);
            } catch (error) {
              core.warning(`Unable to assign copilot (${error.message}); creating issue without assignee`);
              const fallbackBody = `${body}\n- Note: automatic @copilot assignment was not permitted for this repository.`;
              const issue = await github.rest.issues.create({
                ...payloadBase,
                body: fallbackBody,
              });
              core.info(`Created issue #${issue.data.number} without assignee`);
            }
